<div class="select" [class.select--open]="isOpen()" [class.select--disabled]="isDisabled()">
  <!-- Invisible sizer: stacks all options to define the maximum dropdown width -->
  <div class="select__sizer" aria-hidden="true">
    @for (opt of options(); track opt.value) {
      <span>{{ opt.label }}</span>
    }
  </div>

  <button
    type="button"
    class="select__trigger"
    [class.select__trigger--placeholder]="!hasValue()"
    (click)="toggle()"
    [attr.aria-expanded]="isOpen()"
    aria-haspopup="listbox"
    aria-controls="select-dropdown"
  >
    <span class="select__value">{{ selectedLabel() }}</span>
    <app-icon class="select__chevron" name="chevron-down" />
  </button>

  @if (isOpen()) {
    <ul id="select-dropdown" class="select__dropdown" role="listbox">
      @for (option of options(); track option.value; let i = $index) {
        <li
          class="select__option"
          [class.select__option--selected]="option.value === value()"
          [class.select__option--focused]="i === focusedIndex()"
          role="option"
          [attr.aria-selected]="option.value === value()"
          (click)="select(option)"
        >
          {{ option.label }}
          @if (option.value === value()) {
            <app-icon name="check" />
          }
        </li>
      }
    </ul>
  }
</div>
