<section class="login">
  @if (introVisible()) {
    <div class="login__intro">
      <div class="login__intro-glow"></div>
      <img class="login__intro-logo" src="logo.svg" alt="Citadex logo" width="160" height="160" />
      <span class="login__intro-wordmark">CITADEX</span>
    </div>
  } @else {
    <div class="login__card">
      <div class="login__header">
        <a class="login__logo" routerLink="/">Citadex</a>
        <h1 class="login__title">{{ T.LOGIN_TITLE }}</h1>
        <p class="login__subtitle">{{ T.LOGIN_SUBTITLE }}</p>
      </div>

      <form class="login__form" [formGroup]="form" (ngSubmit)="onSubmit()">
        <!-- Email -->
        <div class="login__field" [class.login__field--error]="emailInvalid">
          <label class="login__label" for="login-email">{{ T.LOGIN_EMAIL_LABEL }}</label>
          <input
            class="login__input"
            id="login-email"
            type="email"
            autocomplete="email"
            [placeholder]="T.LOGIN_EMAIL_PLACEHOLDER"
            formControlName="email"
          />
          @if (emailInvalid) {
            <span class="login__error-hint">{{ T.LOGIN_ERROR_EMAIL_INVALID }}</span>
          }
        </div>

        <!-- Password -->
        <div class="login__field" [class.login__field--error]="passwordInvalid">
          <label class="login__label" for="login-password">{{ T.LOGIN_PASSWORD_LABEL }}</label>
          <div class="login__input-wrapper">
            <input
              class="login__input"
              id="login-password"
              [type]="showPassword() ? 'text' : 'password'"
              autocomplete="new-password"
              [attr.readonly]="true"
              (focus)="removeReadonly($event)"
              [placeholder]="T.LOGIN_PASSWORD_PLACEHOLDER"
              formControlName="password"
            />
            <button
              class="login__eye-toggle"
              type="button"
              [attr.aria-label]="showPassword() ? T.LOGIN_PASSWORD_HIDE : T.LOGIN_PASSWORD_SHOW"
              (click)="togglePasswordVisibility()"
            >
              @if (showPassword()) {
                <!-- Eye-off icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              } @else {
                <!-- Eye icon -->
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
              }
            </button>
          </div>
          @if (passwordInvalid) {
            <span class="login__error-hint">{{ T.LOGIN_ERROR_PASSWORD_REQUIRED }}</span>
          }
        </div>

        <!-- Server error -->
        @if (errorMessage()) {
          <p class="login__server-error">{{ errorMessage() }}</p>
        }

        <!-- Submit -->
        <button class="login__submit" type="submit" [disabled]="isLoading()">
          @if (isLoading()) {
            <span class="login__spinner" aria-hidden="true"></span>
          }
          {{ T.LOGIN_SUBMIT }}
        </button>
      </form>

      <!-- Divider -->
      <div class="login__divider">
        <span>{{ T.LOGIN_DIVIDER }}</span>
      </div>

      <!-- Google -->
      <button class="login__google" type="button" [disabled]="isLoading()" (click)="onGoogleSignIn()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        {{ T.LOGIN_GOOGLE }}
      </button>
    </div>
  }
</section>
