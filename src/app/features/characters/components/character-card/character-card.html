<a class="card" [routerLink]="['/characters', character().id]">
  <div class="card__media">
    <img
      class="card__image"
      [src]="character().image"
      [alt]="character().name"
      loading="lazy"
    />

    <div class="card__scrim">
      <h2 class="card__name">{{ character().name }}</h2>
      <app-character-status class="card__status-line" [character]="character()" />
    </div>

    <button
      class="card__favorite-btn"
      [class.card__favorite-btn--active]="isFavorite()"
      [attr.aria-label]="isFavorite() ? T.COMMON_FAVORITE_REMOVE_ARIA : T.COMMON_FAVORITE_ADD_ARIA"
      (click)="onFavoriteToggle($event)"
    >
      @if (isFavorite()) {
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      } @else {
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
        </svg>
      }
    </button>
  </div>

</a>
