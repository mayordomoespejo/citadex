<a class="card" [routerLink]="['/characters', character().id]">
  <div class="card__media">
    <img
      class="card__image"
      [ngSrc]="character().image"
      [alt]="character().name"
      width="300"
      height="300"
    />

    <div class="card__scrim">
      <h2 class="card__name">{{ character().name }}</h2>
      <app-character-status class="card__status-line" [character]="character()" />
    </div>

    <button
      class="card__favorite-btn"
      [class.card__favorite-btn--active]="isFavorite()"
      [attr.aria-label]="isFavorite() ? T.COMMON_FAVORITE_REMOVE_ARIA : T.COMMON_FAVORITE_ADD_ARIA"
      (click)="onFavoriteToggle($event)"
    >
      @if (isFavorite()) {
        <app-icon name="heart-filled" />
      } @else {
        <app-icon name="heart-outline" />
      }
    </button>
  </div>

</a>
